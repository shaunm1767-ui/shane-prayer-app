<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shane Satsang Audio</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#fff;
    text-align:center;
    margin:0;
    padding:20px;
}
h1{color:#ffd700;}
button{
    width:90%;
    max-width:400px;
    padding:15px;
    margin:8px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:#222;
    color:#fff;
}
button:hover{background:#ffd700;color:#000;}
audio{margin-top:20px;width:90%;}
</style>
</head>

<body>

<h1>Shane Satsang</h1>

<div id="playlist"></div>

<audio id="player" controls></audio>

<script>
const tracks = [

{title:"Ganesh Chalisa", file:"media/audio/shane_ganesh_chalisa.mp3"},
{title:"Durga Chalisa", file:"media/audio/shane_durga_chalisa.mp3"},
{title:"Hanuman Arthi", file:"media/audio/shane_hanuman_arthi.mp3"},
{title:"Krishna Bhajan", file:"media/audio/shane_krishna_bhajan.mp3"},
{title:"Shiva Bhajan", file:"media/audio/shane_shiva_bhajan.mp3"},
{title:"Universal Arthi", file:"media/audio/shane_uniserval_arthi.mp3"},
{title:"Ram Bhajan", file:"media/audio/shane_ram_bhajan.mp3"},
{title:"Saraswathi Arthi", file:"media/audio/shane_saraswathi_arthi.mp3"},
{title:"Luxmi Arthi", file:"media/audio/shane_luxmi_arthi.mp3"},
{title:"Mother Bhajan", file:"media/audio/shane_mother_bhajan.mp3"},
{title:"Nahichaiiye Bhajan", file:"media/audio/shane_nahichaiiye_bhajan.mp3"},
{title:"Discourse 1", file:"media/audio/shane_discourse.mp3"},
{title:"Discourse 2", file:"media/audio/shane_discourse1.mp3"},
{title:"Discourse 3", file:"media/audio/shane_discourse2.mp3"}

];

const playlist = document.getElementById("playlist");
const player = document.getElementById("player");

tracks.forEach(track=>{
    const btn = document.createElement("button");
    btn.textContent = track.title;
    btn.onclick = () => {
        player.src = track.file;
        player.play();
    };
    playlist.appendChild(btn);
});
</script>

</body>
</html>
