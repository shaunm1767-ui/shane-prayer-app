<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The South African Hindu – Daily Prayer</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #dbeefe, #c7e2f5); /* Soft Ganga-blue */
}

header {
    padding: 15px;
    text-align: center;
    background: #b3d7f0;
    font-size: 22px;
    font-weight: bold;
}

.dashboard {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 220px;
    background: #a7cfe8;
    padding: 10px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin-bottom: 5px;
    border: none;
    background: #cfe6f7;
    font-weight: bold;
    cursor: pointer;
}

.sidebar button.active {
    background: #f1c45b;
}

.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.section {
    background: rgba(255,255,255,0.7);
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 12px;
}

img {
    max-width: 300px;
    display: block;
    margin: 15px auto;
    border-radius: 12px;
}

audio, video {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>
<body>

<header>🌅 The South African Hindu – Daily Prayer Dashboard</header>

<div class="dashboard">
    <div class="sidebar" id="dayButtons"></div>

    <div class="content">
        <div class="section">
            <h2 id="dayTitle"></h2>
        </div>

        <div class="section">
            <h3>🌞 Morning Surya Prayer (Daily)</h3>
            <ol>
                <li>Wake up at sunrise</li>
                <li>Bath or shower</li>
                <li>Offer water (Jal) to Surya</li>
                <li>Recite Gayatri Mantra</li>
                <li>Meditate on health and vitality</li>
            </ol>
            <audio id="suryaAudio" controls>
                <source src="media/audio/Surya.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <div class="section">
            <h3 id="deityName"></h3>
            <img id="deityImage" src="" alt="">
            <audio id="deityAudio" controls></audio>
            <video id="deityVideo" controls style="display:none;"></video>
        </div>

        <div class="section">
            <h3>🎵 Media Library</h3>
            <select id="mediaSelect"></select>
            <audio id="libraryPlayer" controls></audio>
            <video id="libraryVideo" controls style="display:none;"></video>
        </div>
    </div>
</div>

<script>
const days = [
  { day: "Sunday", deity: "Surya", img: "Surya.jpg", audio: "Surya.mp3" },
  { day: "Monday", deity: "Shiva", img: "shiva.jpg", audio: "shiva.mp3" },
  { day: "Tuesday", deity: "Hanuman", img: "Hanuman.jpg", audio: "hanuman.mp4" },
  { day: "Wednesday", deity: "Ganesha", img: "GANESHA.JPG" },
  { day: "Thursday", deity: "Saraswati", img: "Saraswati.jpg" },
  { day: "Friday", deity: "Lakshmi", img: "Lakshmi.jpg" },
  { day: "Saturday", deity: "Shani", img: "shani.jpg" }
];

const todayIndex = new Date().getDay();
const buttons = document.getElementById("dayButtons");

days.forEach((d, i) => {
    const b = document.createElement("button");
    b.textContent = d.day;
    if(i === todayIndex) b.classList.add("active");
    b.onclick = () => loadDay(i);
    buttons.appendChild(b);
});

function loadDay(i) {
    const d = days[i];
    document.getElementById("dayTitle").textContent = `Today is ${d.day} – Focus on ${d.deity}`;
    document.getElementById("deityName").textContent = d.deity;
    document.getElementById("deityImage").src = `media/gods/${d.img}`;

    const audioEl = document.getElementById("deityAudio");
    const videoEl = document.getElementById("deityVideo");

    if(d.audio) {
        const ext = d.audio.split('.').pop().toLowerCase();
        if(ext === 'mp3' || ext === 'wma') {
            audioEl.src = `media/audio/${d.audio}`;
            audioEl.style.display = "block";
            videoEl.style.display = "none";
        } else if(ext === 'mp4') {
            videoEl.src = `media/audio/${d.audio}`;
            videoEl.style.display = "block";
            audioEl.style.display = "none";
        }
    } else {
        audioEl.style.display = "none";
        videoEl.style.display = "none";
    }
}

loadDay(todayIndex);

/* MEDIA LIBRARY */
const mediaFiles = [
    "02 02 Track 2.wma",
    "06 Mujko Pyaari raam.mp3",
    "durga.mp4",
    "hanuman.mp4",
    "jai ganesh 8 names.mp3",
    "JAI SIYA RAAM.wma",
    "kabi pyaase.mp3",
    "mahamantra.mp4",
    "om nmha sivaya.mp3",
    "shane_bhajan.mp4",
    "shane_satsang.mp4",
    "shiva.mp3",
    "shiva.mp4",
    "siya raam.mp3",
    "swarg se sundar.mp3",
    "THERE SHARAN.wma",
    "WhatsApp Video 2025-11-26 at 08.42.03.mp4"
];

const select = document.getElementById("mediaSelect");
const libAudio = document.getElementById("libraryPlayer");
const libVideo = document.getElementById("libraryVideo");

mediaFiles.forEach(f => {
    const opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    select.appendChild(opt);
});

select.onchange = () => {
    const f = select.value;
    const ext = f.split('.').pop().toLowerCase();
    if(ext === 'mp3' || ext === 'wma') {
        libAudio.src = `media/audio/${f}`;
        libAudio.style.display = "block";
        libVideo.style.display = "none";
        libAudio.play();
    } else if(ext === 'mp4') {
        libVideo.src = `media/audio/${f}`;
        libVideo.style.display = "block";
        libAudio.style.display = "none";
        libVideo.play();
    }
};
</script>

</body>
</html>
