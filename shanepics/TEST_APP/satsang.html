<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Satsang Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #cfe9f5, #eaf6fb);
        color: #033649;
    }

    header {
        padding: 16px;
        text-align: center;
        font-size: 1.4em;
        font-weight: bold;
    }

    .days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        padding: 10px;
    }

    .day-btn {
        padding: 10px;
        background: #ffffff;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        border: 2px solid transparent;
        font-size: 0.9em;
    }

    .day-btn.active {
        border-color: #2b7dbf;
        background: #e3f2fb;
        font-weight: bold;
    }

    .content {
        padding: 16px;
    }

    .card {
        background: white;
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    h3 {
        margin-top: 0;
        color: #045a8d;
    }

    ol {
        padding-left: 18px;
    }

    audio {
        width: 100%;
        margin-top: 10px;
    }

    .tests {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
    }

    .test-btn {
        padding: 8px;
        border-radius: 8px;
        background: #eaf6fb;
        border: 1px solid #2b7dbf;
        cursor: pointer;
        font-size: 0.8em;
    }

    footer {
        text-align: center;
        font-size: 0.75em;
        padding: 10px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<header>Satsang – Daily Prayer Flow</header>

<div class="days" id="days"></div>

<div class="content">
    <div class="card">
        <h3 id="dayTitle"></h3>
        <ol id="prayerList"></ol>

        <audio controls>
            <!-- 🔴 REPLACE BASE64 BELOW WITH YOUR REAL AUDIO -->
            <source src="data:audio/mp3;base64,PASTE_YOUR_BASE64_AUDIO_HERE">
            Your browser does not support audio.
        </audio>
    </div>

    <div class="card">
        <h3>Closed Tests (Max 5)</h3>
        <div class="tests">
            <button class="test-btn">Test 1</button>
            <button class="test-btn">Test 2</button>
            <button class="test-btn">Test 3</button>
            <button class="test-btn">Test 4</button>
            <button class="test-btn">Test 5</button>
        </div>
    </div>
</div>

<footer>Offline • Single-file • Deterministic</footer>

<script>
const prayers = {
    Sunday: {
        deity: "Surya (Sun)",
        steps: [
            "Wake up at sunrise",
            "Bath or wash face",
            "Offer water to Surya",
            "Recite Gayatri Mantra",
            "Meditate on vitality"
        ]
    },
    Monday: {
        deity: "Shiva",
        steps: [
            "Morning cleansing",
            "Offer water or milk to Shiva",
            "Chant Om Namah Shivaya",
            "Silent meditation",
            "Gratitude reflection"
        ]
    },
    Tuesday: {
        deity: "Hanuman",
        steps: [
            "Early wake-up",
            "Read Hanuman Chalisa",
            "Offer sindoor or flowers",
            "Focus on strength",
            "Short meditation"
        ]
    },
    Wednesday: {
        deity: "Ganesha",
        steps: [
            "Clean space",
            "Offer modak or fruit",
            "Chant Om Gan Ganapataye",
            "Focus on clarity",
            "Calm breathing"
        ]
    },
    Thursday: {
        deity: "Guru / Brihaspati",
        steps: [
            "Wear light colors",
            "Offer flowers",
            "Read Guru mantra",
            "Study or reflection",
            "Gratitude practice"
        ]
    },
    Friday: {
        deity: "Lakshmi",
        steps: [
            "Clean home",
            "Offer sweets",
            "Chant Lakshmi mantra",
            "Focus on abundance",
            "Silent prayer"
        ]
    },
    Saturday: {
        deity: "Shani",
        steps: [
            "Wake calmly",
            "Offer oil or sesame",
            "Chant Shani mantra",
            "Self-discipline reflection",
            "Grounding meditation"
        ]
    }
};

const daysContainer = document.getElementById("days");
const dayTitle = document.getElementById("dayTitle");
const prayerList = document.getElementById("prayerList");

function loadDay(day) {
    document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(day).classList.add("active");

    dayTitle.textContent = `${day} – ${prayers[day].deity}`;
    prayerList.innerHTML = "";
    prayers[day].steps.forEach(step => {
        const li = document.createElement("li");
        li.textContent = step;
        prayerList.appendChild(li);
    });
}

Object.keys(prayers).forEach(day => {
    const btn = document.createElement("div");
    btn.className = "day-btn";
    btn.id = day;
    btn.textContent = day;
    btn.onclick = () => loadDay(day);
    daysContainer.appendChild(btn);
});

const today = new Date().toLocaleDateString("en-US", { weekday: "long" });
loadDay(today);
</script>

</body>
</html>
