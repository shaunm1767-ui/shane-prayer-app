<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The South African Hindu – Daily Prayer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #dbeefe, #c7e2f5); /* Ganga river soft blue */
}

header {
    padding: 15px;
    text-align: center;
    background: #b3d7f0;
    font-size: 20px;
    font-weight: bold;
}

.dashboard {
    display: flex;
    height: calc(100vh - 60px);
}

.sidebar {
    width: 220px;
    background: #a7cfe8;
    padding: 10px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin-bottom: 5px;
    border: none;
    background: #cfe6f7;
    font-weight: bold;
    cursor: pointer;
}

.sidebar button.active {
    background: #f1c45b;
}

.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

.section {
    background: rgba(255,255,255,0.7);
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 12px;
}

img {
    max-width: 300px;
    display: block;
    margin: 15px auto;
    border-radius: 12px;
}

audio, video {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>
<body>

<header>
🌅 The South African Hindu – Daily Prayer Dashboard
</header>

<div class="dashboard">
    <div class="sidebar" id="dayButtons"></div>

    <div class="content">
        <div class="section">
            <h2 id="dayTitle"></h2>
        </div>

        <div class="section">
            <h3>🌞 Morning Surya Prayer (Daily)</h3>
            <ol>
                <li>Wake up at sunrise</li>
                <li>Bath or shower</li>
                <li>Offer water (Jal) to Surya</li>
                <li>Recite Gayatri Mantra or Surya Slokas</li>
                <li>Meditate on vitality and health</li>
            </ol>
        </div>

        <div class="section">
            <h3 id="deityName"></h3>
            <img id="deityImage" src="" alt="">
            <audio id="deityAudio" controls></audio>
        </div>
    </div>
</div>

<script>
const days = [
  { day: "Sunday", deity: "Surya", img: "Surya.jpg", audio: "Surya.mp3" },
  { day: "Monday", deity: "Shiva", img: "shiva.jpg", audio: "shiva.mp3" },
  { day: "Tuesday", deity: "Hanuman", img: "Hanuman.jpg", audio: "hanuman.mp3" },
  { day: "Wednesday", deity: "Ganesha", img: "GANESHA.JPG", audio: "ganesha.mp3" },
  { day: "Thursday", deity: "Saraswati", img: "Saraswati.jpg", audio: "saraswati.mp3" },
  { day: "Friday", deity: "Lakshmi", img: "Lakshmi.jpg", audio: "lakshmi.mp3" },
  { day: "Saturday", deity: "Shani", img: "shani.jpg", audio: "shani.mp3" }
];

const todayIndex = new Date().getDay(); // 0=Sunday, 6=Saturday

const buttons = document.getElementById("dayButtons");
days.forEach((d, i) => {
    const b = document.createElement("button");
    b.textContent = d.day;
    if (i === todayIndex) b.classList.add("active");
    b.onclick = () => loadDay(i);
    buttons.appendChild(b);
});

function loadDay(i) {
    const d = days[i];
    document.getElementById("dayTitle").textContent =
        `Today is ${d.day} – Focus on ${d.deity}`;
    document.getElementById("deityName").textContent = d.deity;
    document.getElementById("deityImage").src = `media/gods/${d.img}`;

    const audio = document.getElementById("deityAudio");
    if (d.audio) {
        audio.src = `media/audio/${d.audio}`;
        audio.style.display = "block";
    } else {
        audio.style.display = "none";
    }

    // Update active button
    document.querySelectorAll(".sidebar button").forEach((btn, idx) => {
        btn.classList.toggle("active", idx === i);
    });
}

loadDay(todayIndex);
</script>

</body>
</html>
