<!DOCTYPE html>
<html lang="en">
<head><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<meta charset="UTF-8">
<title>Shane Satsang Dashboard</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg,#dbeefe,#c7e2f5);
}
header {
  background: #b3d7f0;
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}
.container {
  display: flex;
  height: calc(100vh - 60px);
}
.sidebar {
  width: 260px;
  background: #a7cfe8;
  padding: 10px;
  overflow-y: auto;
}
.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
.sidebar button.active {
  background: #f1c45b;
}
.sidebar select, .sidebar ul {
  width: 100%;
  margin-top: 10px;
  margin-bottom: 10px;
}
.sidebar ul li {
  margin: 4px 0;
}
.content {
  flex:1;
  padding: 15px;
  overflow-y:auto;
}
.section {
  background: rgba(255,255,255,0.8);
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 12px;
}
#aum-slideshow {
  display:flex;
  justify-content:center;
  gap:10px;
  overflow:hidden;
  margin-bottom: 20px;
}
#aum-slideshow img {
  width: 60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
  animation: rotate 20s linear infinite;
}
@keyframes rotate {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
#deity-slideshow {
  display:flex;
  justify-content:center;
  gap:10px;
  overflow:hidden;
  margin-top:10px;
}
#deity-slideshow img {
  width:200px;
  height:200px;
  border-radius:12px;
  object-fit:cover;
}
audio {
  width:100%;
  margin-top:10px;
}
</style>
</head>
<body>

<header>🌅 Shane Satsang – Daily Flow</header>

<div class="container">
  <div class="sidebar">
    <div id="days"></div>
    <h4>📅 Religious Dates</h4>
    <select id="monthSelect">
      <option value="0">January</option>
      <option value="1">February</option>
      <option value="2">March</option>
      <option value="3">April</option>
      <option value="4">May</option>
      <option value="5">June</option>
      <option value="6">July</option>
      <option value="7">August</option>
      <option value="8">September</option>
      <option value="9">October</option>
      <option value="10">November</option>
      <option value="11">December</option>
    </select>
    <ul id="religiousDatesList"></ul>
    <div id="dailyReminder" style="margin-top:10px;font-weight:bold;"></div>
  </div>

  <div class="content">
    <div id="aum-slideshow">
      <img src="media/gods/aum.jpeg" alt="AUM1">
      <img src="media/gods/aum2.jpeg" alt="AUM2">
      <img src="media/gods/aum3.jpeg" alt="AUM3">
      <img src="media/gods/aum4.jpeg" alt="AUM4">
      <img src="media/gods/aum5.jpeg" alt="AUM5">
      <img src="media/gods/aum6.jpeg" alt="AUM6">
    </div>

    <h2 id="title"></h2>

    <div class="section">
      <h3 id="deityName"></h3>
      <div id="deity-slideshow"></div>
      <audio id="deityAudio" controls></audio>
    </div>

    <div class="section">
      <h3>🌞 Daily Flow / Meditation</h3>
      <ol id="dailyFlow"></ol>
    </div>
  </div>
</div>

<script>
// --- Days and Deity Data ---
const days = [
  {day:"Sunday", deity:"Surya", imgs:["Surya.jpg"], audios:["shane_ram_bhajan.mp3"], flow:[
    "Wake at sunrise",
    "Bath",
    "Offer water to Surya",
    "Gayatri mantra",
    "Meditate on health & vitality"
  ]},
  {day:"Monday", deity:"Shiva", imgs:["shiva.jpg","shiva1.jpeg","shiva2.jpeg","shiva3.jpeg","shiva4.jpeg","shiva5.jpeg"], audios:["om nmha sivaya.mp3","shiva.mp3","shane_shiv_arthi.mp3","shane_shiva_bhajan.mp3"], flow:[
    "Wake early",
    "Meditate on Shiva",
    "Chant Shiva mantra",
    "Meditate on detachment and peace"
  ]},
  {day:"Tuesday", deity:"Hanuman", imgs:["Hanuman.jpg","hanuman1.jpeg","hanuman2.jpeg","hanuman3.jpeg"], audios:["shane_hanuman_bhajan.mp3","shane_hanuman_arthi.mp3"], flow:[
    "Morning exercise",
    "Chant Hanuman Chalisa",
    "Meditate on courage",
    "Offer prayers to Hanuman"
  ]},
  {day:"Wednesday", deity:"Ganesha", imgs:["GANESHA.JPG","ganesh1.jpeg","ganesha2.jpeg","ganesha3.jpeg","ganesha4.jpeg","ganesha5.jpeg","ganesha6.jpeg","ganesha7.jpeg","ganesha8.jpeg"], audios:["shane_ganesh_chalisa.mp3","shane_ganesh_openingprayer.mp3"], flow:[
    "Wake early",
    "Meditate on wisdom",
    "Chant Ganesha mantra",
    "Offer Modak/Prasad",
    "Focus on removing obstacles"
  ]},
  {day:"Thursday", deity:"Vishnu", imgs:["Saraswati.jpg"], audios:["shane_vishnu_bhajan.mp3"], flow:[
    "Wake early",
    "Meditate on Vishnu",
    "Chant Vishnu mantra",
    "Focus on protection and guidance"
  ]},
  {day:"Friday", deity:"Lakshmi", imgs:["Lakshmi.jpg","luxmi1.jpeg","luxmi2.jpeg"], audios:["shane_luxmi_chalisa.mp3","shane_luxmi_arthi.mp3"], flow:[
    "Clean the home",
    "Meditate on Lakshmi",
    "Chant Lakshmi mantra",
    "Offer prayers for abundance"
  ]},
  {day:"Saturday", deity:"Shani", imgs:["shani.jpg"], audios:["shane_uniserval_arthi.mp3"], flow:[
    "Wake early",
    "Meditate on Shani",
    "Chant Shani mantra",
    "Focus on discipline and patience"
  ]}
];

const today = new Date().getDay();
const daysDiv = document.getElementById("days");

// --- Render Day Buttons ---
days.forEach((d,i)=>{
  const btn=document.createElement("button");
  btn.textContent=d.day;
  if(i===today) btn.classList.add("active");
  btn.onclick=()=>loadDay(i);
  daysDiv.appendChild(btn);
});

// --- Load Deity Images, Audio & Daily Flow ---
let deitySlideIndex = 0;
let audioIndex = 0;
let audioPlayer = document.getElementById("deityAudio");
let slideInterval, audioInterval;

function loadDay(i){
  clearInterval(slideInterval);
  clearInterval(audioInterval);

  const d = days[i];
  document.getElementById("title").textContent = "Today is "+d.day+" – Focus on "+d.deity;
  document.getElementById("deityName").textContent = d.deity;

  // --- Daily Flow ---
  const flowList = document.getElementById("dailyFlow");
  flowList.innerHTML="";
  d.flow.forEach(step=>{
    const li = document.createElement("li");
    li.textContent = step;
    flowList.appendChild(li);
  });

  // --- Deity Image Slideshow ---
  const slideDiv = document.getElementById("deity-slideshow");
  slideDiv.innerHTML="";
  d.imgs.forEach(img=>{
    const el = document.createElement("img");
    el.src = "media/gods/"+img;
    slideDiv.appendChild(el);
  });
  const slides = slideDiv.querySelectorAll("img");
  slides.forEach((s,idx)=>s.style.display=idx===0?"block":"none");
  deitySlideIndex=0;
  slideInterval = setInterval(()=>{
    slides[deitySlideIndex].style.display="none";
    deitySlideIndex = (deitySlideIndex+1)%slides.length;
    slides[deitySlideIndex].style.display="block";
  },3000);

  // --- Audio loop ---
  audioIndex=0;
  audioPlayer.src = "media/audio/"+d.audios[audioIndex];
  audioPlayer.play();
  audioPlayer.onended = function(){
    audioIndex = (audioIndex+1)%d.audios.length;
    audioPlayer.src = "media/audio/"+d.audios[audioIndex];
    audioPlayer.play();
  }
}

loadDay(today);

// --- Religious Dates ---
const religiousDates=[
  {date:"2026-01-01", event:"New Year"},
  {date:"2026-01-14", event:"Makar Sankranti"},
  {date:"2026-02-05", event:"Vasant Panchami"},
  {date:"2026-03-09", event:"Holi"},
  {date:"2026-03-21", event:"Ram Navami"},
  {date:"2026-04-30", event:"Hanuman Jayanti"},
  {date:"2026-08-01", event:"Raksha Bandhan"},
  {date:"2026-09-25", event:"Ganesh Chaturthi"},
  {date:"2026-10-04", event:"Durga Ashtami"},
  {date:"2026-11-12", event:"Diwali"}
];

const monthSelect=document.getElementById("monthSelect");
const datesList=document.getElementById("religiousDatesList");
const dailyReminder=document.getElementById("dailyReminder");

function renderDates(month){
  datesList.innerHTML="";
  const now=new Date();
  let todayReminder="";
  religiousDates.forEach(d=>{
    const dt=new Date(d.date);
    if(dt.getMonth()==month){
      const li=document.createElement("li");
      li.textContent=(`${dt.getDate()} - ${d.event}`);
      datesList.appendChild(li);
    }
    if(dt.getDate()==now.getDate() && dt.getMonth()==now.getMonth()){
      todayReminder=`Today: ${d.event}`;
    }
  });
  dailyReminder.textContent=todayReminder;
}

monthSelect.onchange=()=>renderDates(parseInt(monthSelect.value));
renderDates(today);

</script>
</body>
</html>
